<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
  <title>MMC Central - Category</title>
  <meta name="theme-color" content="#2E2B29" />
  <link rel="shortcut icon" href="./assets/images/favicon.webp" type="image/webp" />
  <!-- Preload Critical Assets -->
  <link rel="preload" as="image" href="./assets/images/logo.webp" type="image/webp">
  <link rel="preload" as="image" href="./assets/images/favicon.webp" type="image/webp" fetchpriority="high">
  
  <!-- Preconnects -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Google Font (Cairo) with font-display swap -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            colors: {
              /* ===== Brand Palette ===== */
              'brand-black': '#2E2B29', /* PANTONE Black C  */
              'brand-terra': '#CC6B48', /* PANTONE 7618 C   */
              'brand-brown': '#926346', /* PANTONE 876 C    */
              'brand-silver': '#DED7D0', /* PANTONE 7604 C   */
              'brand-cream': '#F4F2ED', /* PANTONE 663 C    */
              /* ===== Semantic Aliases ===== */
              primary: '#2E2B29',
              secondary: '#F4F2ED',
              accent: '#CC6B48',
              muted: '#DED7D0',
            },
            fontFamily: {
              sans: ['GeneralSans', 'NewTitle', 'sans-serif'],
              arabic: ['Cairo', 'sans-serif'],
            }
          },
          container: {
            center: true,
            padding: "1rem",
            screens: {
              sm: "540px",
              md: "720px",
              lg: "960px",
              xl: "1140px",
              "2xl": "1320px"
            }
          }
        }
      }
    }
  </script>
  
  <!-- Font Awesome -->
  <link rel="preload" as="style" href="./src/css/all.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="./src/css/all.min.css"></noscript>
  
  <!-- AOS CSS -->
  <link rel="preload" as="style" href="https://unpkg.com/aos@2.3.1/dist/aos.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"></noscript>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="./src/css/style.css">
</head>

<body class="bg-secondary text-primary font-sans antialiased overflow-x-hidden selection:bg-accent selection:text-secondary">

  <!-- ===== HEADER PLACEHOLDER ===== -->
  <div data-include="src/partials/header.html"></div>

  <!-- ===== START MAIN ===== -->
  <main role="main" class="pt-[67px] min-h-screen flex flex-col">

    <!-- CATEGORY HERO SECTION -->
    <section class="relative bg-primary py-24 md:py-32 flex items-center justify-center overflow-hidden border-b-4 border-accent">
      <!-- Dynamic Background Image with proper overlay -->
      <div class="absolute inset-0">
        <img id="categoryHeroBg" src="" alt="" class="w-full h-full object-cover opacity-35 transition-opacity duration-700" />
        <!-- Warm gradient overlay matching brand palette -->
        <div class="absolute inset-0 bg-gradient-to-t from-primary/95 via-primary/70 to-primary/45"></div>
      </div>
      
      <div class="container relative z-10 text-center px-4" data-aos="fade-up">
        <h1 id="categoryTitle" class="text-white text-6xl md:text-8xl lg:text-[10rem] font-bold uppercase tracking-tighter leading-none mb-4">
          Loading...
        </h1>
        <p id="categoryDesc" class="text-white/80 text-lg md:text-2xl uppercase tracking-widest max-w-2xl mx-auto">
          Please wait while we fetch the menu
        </p>
      </div>
    </section>

    <!-- PRODUCTS GRID SECTION -->
    <section class="flex-grow py-24 bg-secondary">
      <div class="container">
        
        <!-- Go Back Link -->
        <a href="index.html#menu" class="inline-flex items-center gap-2 font-bold uppercase tracking-widest text-primary hover:text-accent transition-colors mb-12 group">
          <i class="fas fa-arrow-left transform group-hover:-translate-x-2 transition-transform"></i> Back to Categories
        </a>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-20">
          <i class="fas fa-spinner fa-spin text-6xl text-accent mb-6"></i>
          <h2 class="text-2xl font-bold uppercase tracking-widest">Preparing the table...</h2>
        </div>

        <!-- Products Grid -->
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 hidden">
          <!-- Product cards will be injected here -->
        </div>

        <!-- Empty State (Hidden by default) -->
        <div id="emptyState" class="hidden text-center py-20 border-4 border-dashed border-primary/20">
          <i class="fas fa-ghost text-6xl text-primary/30 mb-6"></i>
          <h2 class="text-2xl font-bold uppercase tracking-widest text-primary/50">No items found in this category</h2>
        </div>
        
      </div>
    </section>

  </main>
  <!-- ===== END MAIN ===== -->

  <!-- ===== FOOTER PLACEHOLDER ===== -->
  <div data-include="src/partials/footer.html"></div>

  <!-- ===== START SCRIPTS ===== -->
  <script defer src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <noscript>
    <style>
      [data-aos] {
        opacity: 1 !important;
        transform: none !important;
      }
    </style>
  </noscript>
  
  <!-- Supabase -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./src/js/supabase-config.js"></script>
  <script defer src="./src/js/supabase-client.js"></script>
  <script defer src="./src/js/menu-api.js"></script>
  <!-- Main JS (Includes HTML loader and mobile menu) -->
  <script defer src="./src/js/main.js"></script>
  <!-- Category Specific JS -->
  <script defer src="./src/js/category.js"></script>
  <!-- ===== END SCRIPTS ===== -->

</body>
</html>
