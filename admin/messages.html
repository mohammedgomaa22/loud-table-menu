<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <base href="/admin/">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
  <title>MMC Central | Messages</title>
  <!-- Google Font (Cairo) -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            colors: {
              primary:   '#2E2B29',
              secondary: '#F4F2ED',
              accent:    '#CC6B48',
              adminbg: '#f8f9fa',
            },
            fontFamily: {
              sans: ['GeneralSans', 'NewTitle', 'sans-serif'],
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-adminbg text-primary font-sans antialiased overflow-x-hidden flex h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-primary text-secondary flex-shrink-0 hidden md:flex flex-col h-full transition-all duration-300 relative z-20">
    <div class="p-6 border-b border-secondary/10 flex items-center justify-center">
      <img src="../assets/images/logo.webp" alt="MMC Central" class="h-8 w-auto brightness-0 invert" />
    </div>
    
    <nav class="flex-1 overflow-y-auto py-6 px-4 flex flex-col gap-2">
      <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-home w-5 text-center"></i> Dashboard
      </a>
      <a href="categories.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-layer-group w-5 text-center"></i> Categories
      </a>
      <a href="products.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-box-open w-5 text-center"></i> Products
      </a>
      <a href="messages.html" class="flex items-center gap-3 px-4 py-3 bg-accent text-primary font-bold uppercase tracking-widest text-xs rounded-sm transition-colors">
        <i class="fas fa-envelope w-5 text-center"></i> Messages
      </a>
      <a href="partners.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-handshake w-5 text-center"></i> Partners
      </a>
      <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors mt-auto">
        <i class="fas fa-cog w-5 text-center"></i> Settings
      </a>
    </nav>
    
    <div class="p-4 border-t border-secondary/10">
      <a href="#" data-admin-logout class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:text-red-400 transition-colors">
        <i class="fas fa-sign-out-alt w-5 text-center"></i> Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-full overflow-hidden relative">
    
    <!-- Topbar -->
    <header class="h-20 bg-white border-b border-primary/10 flex items-center justify-between px-6 md:px-10 flex-shrink-0 z-10">
      <div class="flex items-center gap-4">
        <!-- Mobile Menu Button -->
        <button id="mobileMenuBtn" class="md:hidden text-primary hover:text-accent transition-colors">
          <i class="fas fa-bars text-2xl"></i>
        </button>
        <h2 class="text-xl font-bold uppercase tracking-widest text-primary hidden sm:block">Inbox & Messages</h2>
      </div>
      
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-3 border-l border-primary/10 pl-6">
          <div class="w-10 h-10 rounded-full bg-primary text-accent flex items-center justify-center font-bold text-lg">
            A
          </div>
        </div>
      </div>
    </header>

    <!-- Main Scrollable Area -->
    <main class="flex-1 overflow-y-auto p-6 md:p-10">
      
      <!-- Top Action Bar -->
      <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
        <div>
          <h3 class="text-2xl font-bold uppercase tracking-widest text-primary">Customer Messages</h3>
          <p class="text-primary/60 text-sm">Form submissions from the website</p>
        </div>
      </div>

      <!-- Messages Table -->
      <div class="bg-white border-2 border-primary shadow-[6px_6px_0_0_#2E2B29] overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-primary text-secondary">
                <th class="p-4 font-bold uppercase tracking-widest text-xs w-16 text-center">Status</th>
                <th class="p-4 font-bold uppercase tracking-widest text-xs">Customer Name</th>
                <th class="p-4 font-bold uppercase tracking-widest text-xs">Email</th>
                <th class="p-4 font-bold uppercase tracking-widest text-xs hidden md:table-cell">Message Preview</th>
                <th class="p-4 font-bold uppercase tracking-widest text-xs">Date</th>
                <th class="p-4 font-bold uppercase tracking-widest text-xs text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="messagesTableBody" class="divide-y divide-primary/10">
              <tr>
                <td colspan="6" class="p-6 text-center text-sm text-primary/60">Loading messages...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- View Message Modal (Hidden by default) -->
  <div id="viewMessageModal" class="fixed inset-0 bg-primary/80 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-2xl border-2 border-primary shadow-[8px_8px_0_0_#CC6B48]">
      <!-- Header -->
      <div class="bg-primary text-secondary p-4 flex justify-between items-center">
        <h4 class="font-bold uppercase tracking-widest text-sm">Message Details</h4>
        <button type="button" id="closeMessageModalBtn" class="text-secondary hover:text-accent transition-colors">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      <!-- Body -->
      <div class="p-6 md:p-8">
        <div class="flex justify-between items-start mb-6 border-b border-primary/10 pb-4">
          <div>
            <p class="font-bold uppercase tracking-widest text-xs text-primary/50 mb-1">From</p>
            <h5 id="modalMessageName" class="text-xl font-bold text-primary">—</h5>
            <p id="modalMessageEmail" class="text-sm text-primary/70">—</p>
          </div>
          <div class="text-right">
            <p class="font-bold uppercase tracking-widest text-xs text-primary/50 mb-1">Received</p>
            <p id="modalMessageDate" class="text-sm font-bold text-primary">—</p>
          </div>
        </div>
        
        <div class="mb-8">
          <p class="font-bold uppercase tracking-widest text-xs text-primary/50 mb-2">Message</p>
          <div id="modalMessageBody" class="bg-secondary p-4 text-primary leading-relaxed text-sm whitespace-pre-wrap"></div>
        </div>

        <div class="flex justify-end gap-4">
          <a id="modalReplyEmail" href="#" class="bg-primary text-secondary px-6 py-3 font-bold uppercase tracking-widest text-xs hover:bg-accent hover:text-primary transition-colors flex items-center gap-2">
            <i class="fas fa-reply"></i> Reply via Email
          </a>
          <button type="button" id="deleteMessageBtn" class="bg-secondary text-red-500 px-6 py-3 font-bold uppercase tracking-widest text-xs hover:bg-red-500 hover:text-white transition-colors flex items-center gap-2">
            <i class="fas fa-trash"></i> Delete
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Sidebar Overlay -->
  <div id="mobileSidebarOverlay" class="fixed inset-0 bg-primary/80 z-40 hidden md:hidden opacity-0 transition-opacity duration-300"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../src/js/supabase-config.js"></script>
  <script src="../src/js/supabase-client.js"></script>
  <script src="js/admin-common.js"></script>
  <script src="js/admin-messages.js"></script>
</body>
</html>
