<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8" />
  <base href="/admin/">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
  <title>MMC Central | Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            colors: {
              primary: '#2E2B29',
              secondary: '#F4F2ED',
              accent: '#CC6B48',
            },
            fontFamily: {
              sans: ['GeneralSans', 'NewTitle', 'sans-serif'],
              arabic: ['Cairo', 'sans-serif'],
            }
          }
        }
      }
    }
  </script>
</head>

<body class="bg-primary text-secondary min-h-screen flex items-center justify-center font-sans antialiased">

  <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-accent/10 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="w-full max-w-md px-6 relative z-10">
    <div class="text-center mb-10">
      <div class="flex justify-center mb-4">
        <img src="../assets/images/logo.webp" alt="MMC Central" class="h-12 w-auto brightness-0 invert" />
      </div>
      <p class="text-secondary/50 uppercase tracking-widest text-sm font-bold">Control Panel</p>
    </div>

    <form id="loginForm" class="bg-white p-8 md:p-10 shadow-[8px_8px_0_0_#CC6B48] border-2 border-primary relative">
      <h2 class="text-2xl font-bold uppercase tracking-tight text-primary mb-8 text-center">Admin Login</h2>

      <p id="loginError" class="hidden mb-6 p-3 bg-red-50 border border-red-200 text-red-600 text-sm font-bold"></p>

      <div class="mb-6">
        <label for="email" class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary">Email Address</label>
        <div class="relative">
          <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-primary/40"></i>
          <input type="email" id="email" required autocomplete="email"
            class="w-full bg-secondary border border-primary/20 p-3 pl-12 text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
        </div>
      </div>

      <div class="mb-8">
        <label for="password" class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary">Password</label>
        <div class="relative">
          <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-primary/40"></i>
          <input type="password" id="password" required autocomplete="current-password"
            class="w-full bg-secondary border border-primary/20 p-3 pl-12 text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
        </div>
      </div>

      <button type="submit" id="loginSubmitBtn"
        class="w-full bg-primary text-secondary font-bold px-8 py-4 uppercase tracking-widest hover:bg-accent hover:text-primary transition-colors flex items-center justify-center gap-3 group">
        Sign In
        <i class="fas fa-arrow-right transform group-hover:translate-x-1 transition-transform"></i>
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../src/js/supabase-config.js"></script>
  <script src="../src/js/supabase-client.js"></script>
  <script src="js/admin-login.js"></script>
</body>

</html>
