<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
  <title>LOUD. | Settings</title>
  <!-- Google Font (Cairo) -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            colors: {
              primary: '#1a1919',
              secondary: '#ececec',
              freshgreen: '#17db67',
              adminbg: '#f8f9fa',
            },
            fontFamily: {
              sans: ['Helvetica', 'Cairo', 'sans-serif'],
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-adminbg text-primary font-sans antialiased overflow-x-hidden flex h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-primary text-secondary flex-shrink-0 hidden md:flex flex-col h-full transition-all duration-300 relative z-20">
    <div class="p-6 border-b border-secondary/10 flex items-center justify-center">
      <h1 class="text-3xl font-bold uppercase tracking-tighter">
        LOUD<span class="text-freshgreen">.</span>
      </h1>
    </div>
    
    <nav class="flex-1 overflow-y-auto py-6 px-4 flex flex-col gap-2">
      <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-home w-5 text-center"></i> Dashboard
      </a>
      <a href="categories.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-layer-group w-5 text-center"></i> Categories
      </a>
      <a href="products.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-box-open w-5 text-center"></i> Products
      </a>
      <a href="messages.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-envelope w-5 text-center"></i> Messages
      </a>
      <a href="settings.html" class="flex items-center gap-3 px-4 py-3 bg-freshgreen text-primary font-bold uppercase tracking-widest text-xs rounded-sm transition-colors mt-auto">
        <i class="fas fa-cog w-5 text-center"></i> Settings
      </a>
    </nav>
    
    <div class="p-4 border-t border-secondary/10">
      <a href="login.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:text-red-400 transition-colors">
        <i class="fas fa-sign-out-alt w-5 text-center"></i> Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-full overflow-hidden relative">
    
    <!-- Topbar -->
    <header class="h-20 bg-white border-b border-primary/10 flex items-center justify-between px-6 md:px-10 flex-shrink-0 z-10">
      <div class="flex items-center gap-4">
        <!-- Mobile Menu Button -->
        <button id="mobileMenuBtn" class="md:hidden text-primary hover:text-freshgreen transition-colors">
          <i class="fas fa-bars text-2xl"></i>
        </button>
        <h2 class="text-xl font-bold uppercase tracking-widest text-primary hidden sm:block">Site Settings</h2>
      </div>
      
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-3 border-l border-primary/10 pl-6">
          <div class="w-10 h-10 rounded-full bg-primary text-freshgreen flex items-center justify-center font-bold text-lg">
            A
          </div>
        </div>
      </div>
    </header>

    <!-- Main Scrollable Area -->
    <main class="flex-1 overflow-y-auto p-6 md:p-10">
      
      <div class="max-w-4xl">
        <!-- Top Action Bar -->
        <div class="mb-8">
          <h3 class="text-2xl font-bold uppercase tracking-widest text-primary">General Settings</h3>
          <p class="text-primary/60 text-sm">Update your website's main information</p>
        </div>

        <!-- Settings Form -->
        <form class="space-y-8">
          
          <!-- Basic Info Section -->
          <div class="bg-white p-6 md:p-8 border-2 border-primary shadow-[6px_6px_0_0_#1a1919]">
            <h4 class="text-lg font-bold uppercase tracking-widest text-primary mb-6 border-b border-primary/10 pb-4">Basic Information</h4>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="md:col-span-2">
                <label class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary">Website Title</label>
                <input type="text" value="Loud Table Menu" class="w-full bg-secondary border border-primary/20 p-3 focus:outline-none focus:border-freshgreen focus:ring-1 focus:ring-freshgreen transition-colors">
              </div>
              
              <div>
                <label class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary">Contact Email</label>
                <input type="email" value="contact@loud.com" class="w-full bg-secondary border border-primary/20 p-3 focus:outline-none focus:border-freshgreen focus:ring-1 focus:ring-freshgreen transition-colors">
              </div>

              <div>
                <label class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary">Contact Phone</label>
                <input type="tel" value="+966 50 123 4567" class="w-full bg-secondary border border-primary/20 p-3 focus:outline-none focus:border-freshgreen focus:ring-1 focus:ring-freshgreen transition-colors">
              </div>

              <div class="md:col-span-2">
                <label class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary">About Text (Footer/Hero)</label>
                <textarea rows="3" class="w-full bg-secondary border border-primary/20 p-3 focus:outline-none focus:border-freshgreen focus:ring-1 focus:ring-freshgreen transition-colors resize-none">We believe in food that speaks for itself. No shortcuts, just authentic ingredients and bold flavors.</textarea>
              </div>
            </div>
          </div>

          <!-- Branding Section -->
          <div class="bg-white p-6 md:p-8 border-2 border-primary shadow-[6px_6px_0_0_#1a1919]">
            <h4 class="text-lg font-bold uppercase tracking-widest text-primary mb-6 border-b border-primary/10 pb-4">Branding & Images</h4>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
              
              <!-- Logo Upload -->
              <div>
                <label class="block font-bold uppercase tracking-widest text-xs mb-4 text-primary">Website Logo</label>
                <div class="flex items-center gap-4 mb-4">
                  <div class="w-20 h-20 bg-primary flex items-center justify-center p-2 border border-primary/20">
                    <img src="../assets/icons/logo-v2.svg" alt="Current Logo" class="max-w-full max-h-full brightness-0 invert">
                  </div>
                  <div>
                    <button type="button" class="bg-secondary text-primary px-4 py-2 text-xs font-bold uppercase tracking-widest hover:bg-primary hover:text-secondary transition-colors mb-2 block relative overflow-hidden">
                      <span class="relative z-10">Change Logo</span>
                      <input type="file" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                    </button>
                    <p class="text-[10px] text-primary/50">SVG or PNG recommended. Max 2MB.</p>
                  </div>
                </div>
              </div>

              <!-- Hero Image Upload -->
              <div>
                <label class="block font-bold uppercase tracking-widest text-xs mb-4 text-primary">Hero Background Image</label>
                <div class="flex items-center gap-4 mb-4">
                  <div class="w-32 h-20 bg-secondary flex items-center justify-center border border-primary/20 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=200&auto=format&fit=crop" alt="Hero" class="w-full h-full object-cover">
                  </div>
                  <div>
                    <button type="button" class="bg-secondary text-primary px-4 py-2 text-xs font-bold uppercase tracking-widest hover:bg-primary hover:text-secondary transition-colors mb-2 block relative overflow-hidden">
                      <span class="relative z-10">Update Image</span>
                      <input type="file" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                    </button>
                    <p class="text-[10px] text-primary/50">High-res JPG recommended (1920x1080).</p>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <!-- Social Links -->
          <div class="bg-white p-6 md:p-8 border-2 border-primary shadow-[6px_6px_0_0_#1a1919]">
            <h4 class="text-lg font-bold uppercase tracking-widest text-primary mb-6 border-b border-primary/10 pb-4">Social Media Links</h4>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary"><i class="fab fa-instagram mr-2"></i>Instagram</label>
                <input type="url" placeholder="https://instagram.com/..." class="w-full bg-secondary border border-primary/20 p-3 focus:outline-none focus:border-freshgreen focus:ring-1 focus:ring-freshgreen transition-colors">
              </div>
              
              <div>
                <label class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary"><i class="fab fa-twitter mr-2"></i>Twitter / X</label>
                <input type="url" placeholder="https://twitter.com/..." class="w-full bg-secondary border border-primary/20 p-3 focus:outline-none focus:border-freshgreen focus:ring-1 focus:ring-freshgreen transition-colors">
              </div>

              <div>
                <label class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary"><i class="fab fa-tiktok mr-2"></i>TikTok</label>
                <input type="url" placeholder="https://tiktok.com/@..." class="w-full bg-secondary border border-primary/20 p-3 focus:outline-none focus:border-freshgreen focus:ring-1 focus:ring-freshgreen transition-colors">
              </div>
              
              <div>
                <label class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary"><i class="fab fa-whatsapp mr-2"></i>WhatsApp Number</label>
                <input type="text" placeholder="+966..." class="w-full bg-secondary border border-primary/20 p-3 focus:outline-none focus:border-freshgreen focus:ring-1 focus:ring-freshgreen transition-colors">
              </div>
            </div>
          </div>

          <!-- Save Actions -->
          <div class="flex justify-end gap-4 pb-10">
            <button type="button" class="bg-freshgreen text-primary px-10 py-4 font-bold uppercase tracking-widest text-sm hover:bg-primary hover:text-secondary transition-colors shadow-[6px_6px_0_0_#1a1919]">
              Save All Changes
            </button>
          </div>

        </form>
      </div>

    </main>
  </div>

  <!-- Mobile Sidebar Overlay -->
  <div id="mobileSidebarOverlay" class="fixed inset-0 bg-primary/80 z-40 hidden md:hidden opacity-0 transition-opacity duration-300"></div>

  <!-- Mobile Sidebar Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const mobileBtn = document.getElementById('mobileMenuBtn');
      const sidebar = document.querySelector('aside');
      const overlay = document.getElementById('mobileSidebarOverlay');
      
      let isMobileMenuOpen = false;

      function toggleMobileMenu() {
        isMobileMenuOpen = !isMobileMenuOpen;
        if(isMobileMenuOpen) {
          sidebar.classList.remove('hidden');
          sidebar.classList.add('absolute', 'inset-y-0', 'left-0', 'z-50');
          overlay.classList.remove('hidden');
          setTimeout(() => overlay.classList.remove('opacity-0'), 10);
        } else {
          sidebar.classList.add('hidden');
          sidebar.classList.remove('absolute', 'inset-y-0', 'left-0', 'z-50');
          overlay.classList.add('opacity-0');
          setTimeout(() => overlay.classList.add('hidden'), 300);
        }
      }

      if(mobileBtn) mobileBtn.addEventListener('click', toggleMobileMenu);
      if(overlay) overlay.addEventListener('click', toggleMobileMenu);
    });
  </script>
</body>
</html>
