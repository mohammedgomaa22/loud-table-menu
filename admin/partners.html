<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <base href="/admin/">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
  <title>MMC Central | Partners</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            colors: {
              primary:   '#2E2B29',
              secondary: '#F4F2ED',
              accent:    '#CC6B48',
              adminbg: '#f8f9fa',
            },
            fontFamily: {
              sans: ['GeneralSans', 'NewTitle', 'sans-serif'],
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-adminbg text-primary font-sans antialiased overflow-x-hidden flex h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-primary text-secondary flex-shrink-0 hidden md:flex flex-col h-full transition-all duration-300 relative z-20">
    <div class="p-6 border-b border-secondary/10 flex items-center justify-center">
      <img src="../assets/images/logo.webp" alt="MMC Central" class="h-8 w-auto brightness-0 invert" />
    </div>
    
    <nav class="flex-1 overflow-y-auto py-6 px-4 flex flex-col gap-2">
      <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-home w-5 text-center"></i> Dashboard
      </a>
      <a href="categories.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-layer-group w-5 text-center"></i> Categories
      </a>
      <a href="products.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-box-open w-5 text-center"></i> Products
      </a>
      <a href="messages.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors">
        <i class="fas fa-envelope w-5 text-center"></i> Messages
      </a>
      <a href="partners.html" class="flex items-center gap-3 px-4 py-3 bg-accent text-primary font-bold uppercase tracking-widest text-xs rounded-sm transition-colors">
        <i class="fas fa-handshake w-5 text-center"></i> Partners
      </a>
      <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:bg-secondary/10 hover:text-secondary rounded-sm transition-colors mt-auto">
        <i class="fas fa-cog w-5 text-center"></i> Settings
      </a>
    </nav>
    
    <div class="p-4 border-t border-secondary/10">
      <a href="#" data-admin-logout class="flex items-center gap-3 px-4 py-3 text-secondary/70 font-bold uppercase tracking-widest text-xs hover:text-red-400 transition-colors">
        <i class="fas fa-sign-out-alt w-5 text-center"></i> Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-full overflow-hidden relative">
    
    <header class="h-20 bg-white border-b border-primary/10 flex items-center justify-between px-6 md:px-10 flex-shrink-0 z-10">
      <div class="flex items-center gap-4">
        <button id="mobileMenuBtn" class="md:hidden text-primary hover:text-accent transition-colors">
          <i class="fas fa-bars text-2xl"></i>
        </button>
        <h2 class="text-xl font-bold uppercase tracking-widest text-primary hidden sm:block">Partners Management</h2>
      </div>
      
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-3 border-l border-primary/10 pl-6">
          <div class="w-10 h-10 rounded-full bg-primary text-accent flex items-center justify-center font-bold text-lg">
            A
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 md:p-10">
      
      <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
        <div>
          <h3 class="text-2xl font-bold uppercase tracking-widest text-primary">All Partners</h3>
          <p class="text-primary/60 text-sm">Manage partner logos shown on the website</p>
        </div>
        <button type="button" id="togglePartnerFormBtn" class="bg-primary text-secondary px-6 py-3 font-bold uppercase tracking-widest text-xs hover:bg-accent hover:text-primary transition-colors flex items-center gap-2 shadow-[4px_4px_0_0_#CC6B48]">
          <i class="fas fa-plus"></i> Add New Partner
        </button>
      </div>

      <!-- Add/Edit Form -->
      <div id="addPartnerForm" class="hidden bg-white p-6 md:p-8 border-2 border-primary shadow-[6px_6px_0_0_#2E2B29] mb-10">
        <h4 id="partnerFormTitle" class="text-lg font-bold uppercase tracking-widest text-primary mb-6 border-b border-primary/10 pb-4">Add Partner</h4>
        <form id="partnerForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <div>
            <label for="partnerName" class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary">Partner Name <span class="text-accent">*</span></label>
            <input type="text" id="partnerName" required placeholder="e.g. Amazon"
              class="w-full bg-secondary border border-primary/20 p-3 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
            <p class="text-[10px] text-primary/40 mt-1">Used as the logo alt text on the website (logo only is shown).</p>
          </div>

          <div>
            <label for="partnerSortOrder" class="block font-bold uppercase tracking-widest text-xs mb-2 text-primary">Sort Order</label>
            <input type="number" id="partnerSortOrder" value="0" step="1"
              class="w-full bg-secondary border border-primary/20 p-3 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
          </div>

          <!-- Logo Upload -->
          <div class="md:col-span-2">
            <label class="block font-bold uppercase tracking-widest text-xs mb-3 text-primary">Partner Logo <span class="text-accent">*</span></label>
            <div class="flex flex-col sm:flex-row gap-4">
              <div class="w-full sm:w-40 h-24 sm:h-28 flex-shrink-0 bg-secondary border-2 border-dashed border-primary/20 overflow-hidden relative flex items-center justify-center">
                <img id="partnerLogoPreview" src="" alt="Preview" class="max-w-full max-h-full object-contain p-2 hidden">
                <div id="partnerLogoPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-primary/30">
                  <i class="fas fa-image text-3xl mb-1"></i>
                  <span class="text-[10px] font-bold uppercase tracking-wider">No logo</span>
                </div>
              </div>
              <div class="flex-1 flex flex-col gap-3 justify-center">
                <div>
                  <label class="block font-bold uppercase tracking-widest text-[10px] mb-1 text-primary/60">Upload from Device</label>
                  <input type="file" id="partnerLogoFile" accept="image/*"
                    class="block w-full text-xs text-primary/70 file:mr-3 file:py-2 file:px-4 file:border-0 file:bg-primary file:text-secondary file:font-bold file:uppercase file:tracking-widest file:text-[10px] hover:file:bg-accent cursor-pointer">
                </div>
                <div>
                  <label for="partnerLogoUrl" class="block font-bold uppercase tracking-widest text-[10px] mb-1 text-primary/60">Or paste Logo URL</label>
                  <input type="url" id="partnerLogoUrl" placeholder="https://..."
                    class="w-full bg-secondary border border-primary/20 p-3 text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
                </div>
                <button type="button" id="partnerLogoClearBtn"
                  class="hidden self-start text-[10px] font-bold uppercase tracking-widest text-red-400 hover:text-red-600 transition-colors">
                  <i class="fas fa-times mr-1"></i> Clear Logo
                </button>
              </div>
            </div>
          </div>

          <div class="md:col-span-2 flex justify-end gap-4 mt-2">
            <button type="button" id="cancelPartnerFormBtn"
              class="px-6 py-3 font-bold uppercase tracking-widest text-xs text-primary/60 hover:text-primary transition-colors">
              Cancel
            </button>
            <button type="submit" id="savePartnerBtn"
              class="bg-accent text-primary px-8 py-3 font-bold uppercase tracking-widest text-xs hover:bg-primary hover:text-secondary transition-colors shadow-[4px_4px_0_0_#2E2B29] flex items-center gap-2">
              <i class="fas fa-check"></i> Save Partner
            </button>
          </div>
        </form>
      </div>

      <!-- Partners Table -->
      <div class="bg-white border-2 border-primary shadow-[6px_6px_0_0_#2E2B29] overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-primary text-secondary">
                <th class="p-4 font-bold uppercase tracking-widest text-xs w-24">Logo</th>
                <th class="p-4 font-bold uppercase tracking-widest text-xs">Name</th>
                <th class="p-4 font-bold uppercase tracking-widest text-xs text-center">Order</th>
                <th class="p-4 font-bold uppercase tracking-widest text-xs w-24 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="partnersTableBody" class="divide-y divide-primary/10">
              <tr>
                <td colspan="4" class="p-6 text-center text-sm text-primary/60">Loading partners...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <div id="mobileSidebarOverlay" class="fixed inset-0 bg-primary/80 z-40 hidden md:hidden opacity-0 transition-opacity duration-300"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../src/js/supabase-config.js"></script>
  <script src="../src/js/supabase-client.js"></script>
  <script src="js/admin-common.js"></script>
  <script src="js/admin-partners.js"></script>
</body>
</html>
