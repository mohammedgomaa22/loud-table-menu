<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
  <title>Loud Table Menu - Product Details</title>
  <meta name="theme-color" content="#1a1919" />
  <link rel="shortcut icon" href="./assets/icons/logo-v2.svg" type="image/svg+xml" />
  
  <!-- Preconnects -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Google Font (Cairo) with font-display swap -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            colors: {
              primary: '#1a1919',
              secondary: '#ececec',
              freshgreen: '#17db67',
            },
            fontFamily: {
              sans: ['Helvetica', 'Cairo', 'sans-serif'],
              arabic: ['Cairo', 'sans-serif'],
            }
          },
          container: {
            center: true,
            padding: "1rem",
            screens: {
              sm: "540px",
              md: "720px",
              lg: "960px",
              xl: "1140px",
              "2xl": "1320px"
            }
          }
        }
      }
    }
  </script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- AOS CSS -->
  <link rel="preload" as="style" href="https://unpkg.com/aos@2.3.1/dist/aos.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"></noscript>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="./src/css/style.css">
</head>

<body class="bg-secondary text-primary font-sans antialiased overflow-x-hidden selection:bg-freshgreen selection:text-primary">

  <!-- ===== HEADER PLACEHOLDER ===== -->
  <div data-include="src/partials/header.html"></div>

  <!-- ===== START MAIN ===== -->
  <main role="main" class="pt-[64px] min-h-screen flex flex-col bg-secondary relative">
    
    <!-- Loading State -->
    <div id="loadingState" class="fixed inset-0 z-50 bg-secondary flex flex-col items-center justify-center transition-opacity duration-500">
      <i class="fas fa-spinner fa-spin text-6xl text-freshgreen mb-6"></i>
      <h2 class="text-2xl font-bold uppercase tracking-widest text-primary">Serving...</h2>
    </div>

    <!-- Error State -->
    <div id="errorState" class="hidden container mx-auto px-4 py-32 text-center flex-grow flex flex-col items-center justify-center">
      <h1 class="text-6xl md:text-8xl font-black uppercase text-primary mb-6">404</h1>
      <p class="text-xl md:text-2xl text-primary/70 uppercase tracking-widest mb-10">Product not found on the table.</p>
      <a href="index.html#menu" class="bg-primary text-secondary hover:bg-freshgreen hover:text-primary transition-colors font-bold uppercase tracking-widest px-8 py-4 border-2 border-primary">
        Back to Menu
      </a>
    </div>

    <!-- Main Content Container -->
    <div id="productContainer" class="hidden flex-grow flex flex-col lg:flex-row w-full min-h-[calc(100vh-64px)]">
      
      <!-- Left Column: Sticky Image -->
      <div class="lg:w-1/2 relative lg:sticky lg:top-[64px] h-[50vh] lg:h-[calc(100vh-64px)] bg-primary/5 flex-shrink-0 border-b-4 lg:border-b-0 lg:border-r-4 border-primary">
        <div class="absolute top-4 left-4 z-20">
          <a id="backBtn" href="#" class="inline-flex items-center justify-center w-12 h-12 bg-white text-primary rounded-full hover:bg-freshgreen hover:scale-110 transition-all shadow-lg border-2 border-primary group">
            <i class="fas fa-arrow-left transform group-hover:-translate-x-1 transition-transform"></i>
          </a>
        </div>
        
        <div id="soldOutBadge" class="hidden absolute top-4 right-4 z-20 bg-primary text-secondary font-black text-sm uppercase px-4 py-2 tracking-[0.2em] border-2 border-secondary shadow-[4px_4px_0_0_#17db67] rotate-3">
          SOLD OUT
        </div>

        <div id="productImageWrapper" class="w-full h-full relative overflow-hidden group">
          <img id="productImage" src="" alt="Product Image" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105">
          <div class="absolute inset-0 bg-gradient-to-t from-primary/30 to-transparent lg:hidden pointer-events-none"></div>
        </div>
      </div>

      <!-- Right Column: Details (Scrollable) -->
      <div class="lg:w-1/2 p-6 md:p-12 lg:p-16 xl:p-24 flex flex-col bg-secondary">
        
        <!-- Breadcrumbs -->
        <div class="flex items-center text-sm font-bold uppercase tracking-[0.15em] text-primary/50 mb-8" data-aos="fade-up">
          <a href="index.html#menu" class="hover:text-primary transition-colors">Menu</a>
          <span class="mx-2">/</span>
          <a id="breadcrumbCategory" href="#" class="hover:text-primary transition-colors">Category</a>
        </div>

        <!-- Header: Title & Weight -->
        <div class="mb-10" data-aos="fade-up" data-aos-delay="100">
          <h1 id="productName" class="text-5xl md:text-6xl lg:text-7xl font-black uppercase tracking-tighter leading-[0.9] text-primary mb-6">
            Product Name
          </h1>
          <div id="productWeightWrapper" class="inline-flex">
            <span id="productWeight" class="bg-primary/10 text-primary font-bold uppercase tracking-[0.2em] px-4 py-2 border-l-4 border-freshgreen">
              Weight
            </span>
          </div>
        </div>

        <!-- Price -->
        <div class="mb-12" data-aos="fade-up" data-aos-delay="200">
          <p class="text-sm font-bold uppercase tracking-[0.2em] text-primary/60 mb-2">Price</p>
          <div class="flex items-end gap-4">
            <span id="productPrice" class="text-5xl lg:text-6xl font-black text-primary">BD 0.00</span>
          </div>
        </div>

        <!-- Description -->
        <div id="productDescWrapper" class="mb-12 hidden" data-aos="fade-up" data-aos-delay="300">
          <p class="text-sm font-bold uppercase tracking-[0.2em] text-primary/60 mb-4 border-b-2 border-primary/10 pb-2">Description</p>
          <p id="productDesc" class="text-lg md:text-xl text-primary/80 leading-relaxed font-medium">
            Description goes here.
          </p>
        </div>

        <!-- Action Button (Contact) -->
        <div class="mt-auto pt-8" data-aos="fade-up" data-aos-delay="400">
          <a href="index.html#contact" class="flex items-center justify-center w-full bg-primary text-secondary hover:bg-freshgreen hover:text-primary transition-all duration-300 font-black uppercase text-xl md:text-2xl tracking-[0.15em] py-6 border-2 border-primary hover:shadow-[8px_8px_0_0_#1a1919] active:translate-y-1 active:shadow-[2px_2px_0_0_#1a1919]">
            Contact Us
          </a>
          <p class="text-center text-primary/50 text-xs font-bold uppercase tracking-widest mt-4">Available via Contact Only</p>
        </div>

      </div>

    </div>

    <!-- Related Products Section -->
    <section id="relatedSection" class="hidden bg-primary py-24 border-t-4 border-freshgreen">
      <div class="container px-4">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-12" data-aos="fade-up">
          <div>
            <h2 class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-secondary mb-2">Also in <span id="relatedCategoryName" class="text-freshgreen">Category</span></h2>
            <p class="text-secondary/60 font-bold uppercase tracking-widest">More loud flavors</p>
          </div>
          <a id="viewAllBtn" href="#" class="hidden md:inline-flex items-center gap-2 text-secondary hover:text-freshgreen font-bold uppercase tracking-widest transition-colors group">
            View All <i class="fas fa-arrow-right transform group-hover:translate-x-1 transition-transform"></i>
          </a>
        </div>
        
        <div id="relatedGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <!-- Related items will be injected here -->
        </div>

        <div class="mt-10 text-center md:hidden">
          <a id="viewAllBtnMobile" href="#" class="inline-flex items-center gap-2 text-secondary hover:text-freshgreen font-bold uppercase tracking-widest transition-colors group">
            View All <i class="fas fa-arrow-right transform group-hover:translate-x-1 transition-transform"></i>
          </a>
        </div>
      </div>
    </section>

  </main>
  <!-- ===== END MAIN ===== -->

  <!-- ===== FOOTER PLACEHOLDER ===== -->
  <div data-include="src/partials/footer.html"></div>

  <!-- ===== START SCRIPTS ===== -->
  <script defer src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <noscript>
    <style>
      [data-aos] {
        opacity: 1 !important;
        transform: none !important;
      }
    </style>
  </noscript>
  
  <!-- Main JS (Includes HTML loader and mobile menu) -->
  <script defer src="./src/js/main.js"></script>
  <!-- Product Specific JS -->
  <script defer src="./src/js/product.js"></script>
  <!-- ===== END SCRIPTS ===== -->

</body>
</html>
